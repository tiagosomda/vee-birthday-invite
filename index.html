<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valentina's First Birthday</title>

  <!-- Open Graph (WhatsApp, iMessage, Facebook, LinkedIn) -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="http://www.tiago.dev/vee-birthday-invite/">

  <meta property="og:title" content="Valentina's First Birthday">

  <meta name="twitter:image" content="http://www.tiago.dev/vee-birthday-invite/preview.jpg">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #49ECFB;
      font-family: Georgia, serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
    }

    .photo-container {
      width: 100%;
      max-width: 640px;
    }

    .photo-container img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
    }

    .form-container {
      margin-top: 40px;
      width: 100%;
      max-width: 640px;
    }

    .form-container iframe {
      width: 100%;
      border: none;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    .calendar-section {
      margin-top: 40px;
      width: 100%;
      max-width: 640px;
      text-align: center;
    }

    .calendar-section h2 {
      font-size: 1.2rem;
      font-weight: normal;
      color: #1a1a1a;
      margin-bottom: 16px;
      letter-spacing: 0.03em;
    }

    .calendar-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .calendar-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      border-radius: 8px;
      text-decoration: none;
      font-family: Georgia, serif;
      font-size: 0.9rem;
      transition: box-shadow 0.15s, transform 0.1s;
    }

    .calendar-btn:hover {
      transform: translateY(-1px);
    }

    .cal-icon {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }

    .calendar-btn.gcal {
      background: #fff;
      color: #3c4043;
      border: 1px solid #dadce0;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .calendar-btn.gcal:hover {
      box-shadow: 0 3px 10px rgba(66,133,244,0.25);
    }

    .calendar-btn.acal {
      background: #fff;
      color: #1c1c1e;
      border: 1px solid #e5e5ea;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .calendar-btn.acal:hover {
      box-shadow: 0 3px 10px rgba(255,59,48,0.2);
    }

    .calendar-btn.outlook {
      background: #0078D4;
      color: #fff;
      border: none;
      box-shadow: 0 1px 4px rgba(0,120,212,0.35);
    }

    .calendar-btn.outlook:hover {
      box-shadow: 0 3px 10px rgba(0,120,212,0.45);
    }

    .pool-note {
      margin-top: 40px;
      width: 100%;
      max-width: 640px;
      background: rgba(255,255,255,0.55);
      border-radius: 8px;
      padding: 20px 24px;
      font-size: 0.95rem;
      line-height: 1.6;
      color: #1a1a1a;
    }
  </style>
</head>
<body>

  <div class="photo-container">
    <img src="vee-sunshine-picture-v001.jpg" alt="Vee">
  </div>

  <div class="calendar-section">
    <h2>Add to your calendar</h2>
    <div class="calendar-buttons">
      <a class="calendar-btn gcal" href="https://calendar.google.com/calendar/render?action=TEMPLATE&text=Valentina%27s+Birthday&dates=20260614T140000%2F20260614T180000&details=Pool+opens+at+4pm%21+Please+include+the+names+of+everyone+in+your+group+who%27ll+be+swimming+%E2%80%94+we+need+to+add+them+to+the+HOA+guest+list+in+advance.&location=200+Loch+Highlands+Drive%2C+Cary%2C+NC+27518&ctz=America%2FNew_York" target="_blank" rel="noopener">
        <svg class="cal-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="3.5" width="20" height="18" rx="2.5" fill="white" stroke="#dadce0" stroke-width="1.5"/>
          <path d="M2 6A2.5 2.5 0 0 1 4.5 3.5h15A2.5 2.5 0 0 1 22 6v3H2V6z" fill="#4285F4"/>
          <rect x="7" y="1.5" width="2" height="4" rx="1" fill="#4285F4"/>
          <rect x="15" y="1.5" width="2" height="4" rx="1" fill="#4285F4"/>
          <rect x="4.5" y="12" width="3.5" height="3.5" rx="0.5" fill="#EA4335"/>
          <rect x="10.25" y="12" width="3.5" height="3.5" rx="0.5" fill="#FBBC04"/>
          <rect x="16" y="12" width="3.5" height="3.5" rx="0.5" fill="#34A853"/>
          <rect x="4.5" y="17" width="3.5" height="3.5" rx="0.5" fill="#4285F4"/>
          <rect x="10.25" y="17" width="3.5" height="3.5" rx="0.5" fill="#EA4335"/>
        </svg>
        Google Calendar
      </a>
      <a class="calendar-btn acal" href="vee-birthday.ics">
        <svg class="cal-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="3" width="20" height="19.5" rx="3" fill="white" stroke="#e5e5ea" stroke-width="1.5"/>
          <path d="M2 6A3 3 0 0 1 5 3h14a3 3 0 0 1 3 3v3.5H2V6z" fill="#FF3B30"/>
          <rect x="7" y="1" width="2" height="4.5" rx="1" fill="#FF3B30"/>
          <rect x="15" y="1" width="2" height="4.5" rx="1" fill="#FF3B30"/>
          <text x="12" y="8.8" text-anchor="middle" font-size="3.2" font-family="system-ui,sans-serif" fill="white" font-weight="600" letter-spacing="0.6">JUN</text>
          <text x="12" y="19.5" text-anchor="middle" font-size="9" font-family="system-ui,sans-serif" fill="#1c1c1e" font-weight="300">14</text>
        </svg>
        Apple Calendar
      </a>
      <a class="calendar-btn outlook" href="https://outlook.live.com/calendar/0/deeplink/compose?subject=Valentina%27s+Birthday&startdt=2026-06-14T14%3A00%3A00&enddt=2026-06-14T18%3A00%3A00&body=Pool+opens+at+4pm%21+Please+include+the+names+of+everyone+in+your+group+who%27ll+be+swimming+%E2%80%94+we+need+to+add+them+to+the+HOA+guest+list+in+advance.&location=200+Loch+Highlands+Drive%2C+Cary%2C+NC+27518" target="_blank" rel="noopener">
        <svg class="cal-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <rect width="24" height="24" rx="3" fill="#0078D4"/>
          <ellipse cx="9.5" cy="12" rx="4.5" ry="5.5" fill="white"/>
          <ellipse cx="9.5" cy="12" rx="2.2" ry="3.2" fill="#0078D4"/>
          <rect x="14.5" y="7.5" width="6" height="9" rx="1" fill="rgba(255,255,255,0.2)"/>
          <rect x="15.5" y="9.5" width="4" height="1" rx="0.5" fill="white"/>
          <rect x="15.5" y="12" width="4" height="1" rx="0.5" fill="white"/>
          <rect x="15.5" y="14.5" width="3" height="1" rx="0.5" fill="white"/>
        </svg>
        Outlook
      </a>
    </div>
  </div>

  <div class="pool-note">
    Planning to use the pool? It opens at 4pm! Since we need to submit guest names to the HOA in advance, please include the names of everyone in your group who'll be swimming when you fill out the RSVP below.
  </div>

  <div class="form-container">
    <iframe
      src="https://docs.google.com/forms/d/e/1FAIpQLSc6HYqlCJZPbdqcc2q-BgOXK_lBwXfhZ1yFnUvk2gnz9d3x9g/viewform?embedded=true"
      height="800"
      frameborder="0"
      marginheight="0"
      marginwidth="0">Loading…</iframe>
  </div>

</body>
</html>
