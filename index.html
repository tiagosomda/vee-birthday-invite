<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valentina's First Birthday</title>

  <!-- Open Graph (WhatsApp, iMessage, Facebook, LinkedIn) -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="http://www.tiago.dev/vee-birthday-invite/">
  <meta property="og:site_name" content="Valentina's First Birthday">
  <meta property="og:title" content="Valentina's First Birthday">
  <meta property="og:description" content="You're invited to celebrate Valentina's first birthday!">
  <meta property="og:image" content="http://www.tiago.dev/vee-birthday-invite/preview.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Valentina's First Birthday">
  <meta name="twitter:description" content="You're invited to celebrate Valentina's first birthday!">
  <meta name="twitter:image" content="http://www.tiago.dev/vee-birthday-invite/preview.jpg">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #49ECFB;
      font-family: Georgia, serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
    }

    .photo-container {
      width: 100%;
      max-width: 640px;
    }

    .photo-container img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
    }

    .form-container {
      margin-top: 40px;
      width: 100%;
      max-width: 640px;
    }

    .form-container iframe {
      width: 100%;
      border: none;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    .calendar-section {
      margin-top: 40px;
      width: 100%;
      max-width: 640px;
      text-align: center;
    }

    .calendar-section h2 {
      font-size: 1.2rem;
      font-weight: normal;
      color: #1a1a1a;
      margin-bottom: 16px;
      letter-spacing: 0.03em;
    }

    .calendar-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .calendar-btn {
      display: inline-block;
      padding: 10px 20px;
      border-radius: 6px;
      text-decoration: none;
      font-family: Georgia, serif;
      font-size: 0.9rem;
      background: #fff;
      color: #1a1a1a;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      transition: box-shadow 0.15s;
    }

    .calendar-btn:hover {
      box-shadow: 0 4px 14px rgba(0,0,0,0.18);
    }

    .pool-note {
      margin-top: 40px;
      width: 100%;
      max-width: 640px;
      background: rgba(255,255,255,0.55);
      border-radius: 8px;
      padding: 20px 24px;
      font-size: 0.95rem;
      line-height: 1.6;
      color: #1a1a1a;
    }
  </style>
</head>
<body>

  <div class="photo-container">
    <img src="vee-sunshine-picture-v001.jpg" alt="Vee">
  </div>

  <div class="calendar-section">
    <h2>Add to your calendar</h2>
    <div class="calendar-buttons">
      <a class="calendar-btn" href="https://calendar.google.com/calendar/render?action=TEMPLATE&text=Valentina%27s+Birthday&dates=20260614T140000%2F20260614T180000&details=Pool+opens+at+4pm%21+Please+include+the+names+of+everyone+in+your+group+who%27ll+be+swimming+%E2%80%94+we+need+to+add+them+to+the+HOA+guest+list+in+advance.&location=200+Loch+Highlands+Drive%2C+Cary%2C+NC+27518&ctz=America%2FNew_York" target="_blank" rel="noopener">Google Calendar</a>
      <a class="calendar-btn" href="vee-birthday.ics">Apple Calendar</a>
      <a class="calendar-btn" href="https://outlook.live.com/calendar/0/deeplink/compose?subject=Valentina%27s+Birthday&startdt=2026-06-14T14%3A00%3A00&enddt=2026-06-14T18%3A00%3A00&body=Pool+opens+at+4pm%21+Please+include+the+names+of+everyone+in+your+group+who%27ll+be+swimming+%E2%80%94+we+need+to+add+them+to+the+HOA+guest+list+in+advance.&location=200+Loch+Highlands+Drive%2C+Cary%2C+NC+27518" target="_blank" rel="noopener">Outlook</a>
    </div>
  </div>

  <div class="pool-note">
    Planning to use the pool? It opens at 4pm! Since we need to submit guest names to the HOA in advance, please include the names of everyone in your group who'll be swimming when you fill out the RSVP below.
  </div>

  <div class="form-container">
    <iframe
      src="https://docs.google.com/forms/d/e/1FAIpQLSc6HYqlCJZPbdqcc2q-BgOXK_lBwXfhZ1yFnUvk2gnz9d3x9g/viewform?embedded=true"
      height="800"
      frameborder="0"
      marginheight="0"
      marginwidth="0">Loading…</iframe>
  </div>

</body>
</html>
